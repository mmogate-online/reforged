# Crystal IDs Package
# Reusable named variables for all crystal item IDs.
#
# Sub-files:
#   common-weapon.yml  — Common weapon crystals (tiers 1-7, 20 effects)
#   common-armor.yml   — Common armor crystals (tiers 1-7, 11 effects)
#   fine-weapon.yml    — Fine weapon crystals (tiers 1-7, 26 effects)
#   fine-armor.yml     — Fine armor crystals (tiers 1-7, 16 effects)
#   common-accessory.yml — Common accessory crystals (tier 6, 13 effects)
#   fine-accessory.yml — Fine/Pristine accessory crystals (tier 6, 13 effects)
#   structures.yml     — Fusion + refinement structure IDs
#   boxes.yml          — Crystal gacha box IDs
#
# Naming convention:
#   Individual: {RARITY}_{EFFECT}_{TIER}  e.g. COMMON_POUNDING_RHOMB
#   Tier list:  {RARITY}_{SLOT}_{TIER}_IDS  e.g. COMMON_WEAPON_RHOMB_IDS
#   All list:   {RARITY}_{SLOT}_ALL_IDS  e.g. COMMON_WEAPON_ALL_IDS

