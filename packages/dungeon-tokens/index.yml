# Dungeon Token IDs
#
# Each dungeon gets a unique MEDAL_USEABLE token dropped by bosses.
# Right-click opens a MedalStore shop (VillagerMenuItem → BuyMenuList → BuyList).
#
# Reserved ranges:
#   Token items:   95214–95313 (100 IDs)
#   Menu/VMI IDs:  9999004–9999099  (9999001–9999003 reserved by vanilla JP content)
#   BuyList IDs:   follow Menu id + 1 (9999005, 9999007, ...)
#
# ID layout (Menu=N, List=N+1 per vanilla pattern):
#   Bastion of Lok:   Menu=9999004, List=9999005
#   Sinestral Manor:  Menu=9999006, List=9999007

spec:
  version: "1.0"

variables:
  # Token item IDs
  BASTION_OF_LOK_TOKEN: 95214
  SINESTRAL_MANOR_TOKEN: 95215

  # VillagerMenuItem + BuyMenuList menu IDs (must match)
  BASTION_OF_LOK_MENU: 9999004
  SINESTRAL_MANOR_MENU: 9999006

  # BuyList catalog IDs (Menu id + 1)
  BASTION_OF_LOK_LIST: 9999005
  SINESTRAL_MANOR_LIST: 9999007

exports:
  variables:
    - BASTION_OF_LOK_TOKEN
    - SINESTRAL_MANOR_TOKEN
    - BASTION_OF_LOK_MENU
    - SINESTRAL_MANOR_MENU
    - BASTION_OF_LOK_LIST
    - SINESTRAL_MANOR_LIST
