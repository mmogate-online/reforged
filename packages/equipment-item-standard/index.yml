# Equipment Item Standard Package
# Defines item templates that link equipment to the standard enchant system
#
# This package provides reusable item templates for each tier/slot/role:
#   - HighTier (Grade 4, Mythic): Best-in-slot gear with +15 weapons, +12 armor
#   - MidTier (Grade 3, Superior): Progression gear with +12 weapons, +9 armor
#
# Usage: Patch specs extend these templates and provide item-specific properties
#   (id, name, icon, level, rank, buyPrice, sellPrice, extractRatio, etc.)

imports:
  - from: enchant-standard
    use:
      variables:
        # Enchant IDs for linkEnchantId
        - ENCHANT_HIGH_TIER_WEAPON_DPS_TANK
        - ENCHANT_HIGH_TIER_WEAPON_HEALER
        - ENCHANT_HIGH_TIER_CHEST
        - ENCHANT_HIGH_TIER_HAND_MAIL
        - ENCHANT_HIGH_TIER_HAND_LEATHER
        - ENCHANT_HIGH_TIER_HAND_ROBE
        - ENCHANT_HIGH_TIER_BOOTS
        - ENCHANT_MID_TIER_WEAPON_DPS_TANK
        - ENCHANT_MID_TIER_WEAPON_HEALER
        - ENCHANT_MID_TIER_CHEST
        - ENCHANT_MID_TIER_HAND_MAIL
        - ENCHANT_MID_TIER_HAND_LEATHER
        - ENCHANT_MID_TIER_HAND_ROBE
        - ENCHANT_MID_TIER_BOOTS

definitions:
  # ===========================================================================
  # BASE TEMPLATES (internal)
  # Universal properties shared across all equipment items regardless of tier.
  # ===========================================================================

  _EquipmentBase:
    enchantEnable: true
    storeSellable: false
    unidentifiedItemGrade: 1
    warehouseStorable: true
    guildWarehouseStorable: false
    dropType: 2
    dropIdentify: false
    masterpieceRate: 0

  # Slot bases — add combatItemType and slot-specific defaults.

  _WeaponBase:
    $extends: _EquipmentBase
    combatItemType: EQUIP_WEAPON
    linkPassivityCategoryId:
      - "120300"

  _ChestBase:
    $extends: _EquipmentBase
    combatItemType: EQUIP_ARMOR_BODY

  _GlovesBase:
    $extends: _EquipmentBase
    combatItemType: EQUIP_ARMOR_ARM

  _BootsBase:
    $extends: _EquipmentBase
    combatItemType: EQUIP_ARMOR_LEG

  # ===========================================================================
  # TIER INTERMEDIARIES (internal)
  # Slot base → Tier intermediary → Exported definition
  # Each intermediary adds the tier-specific standard attributes:
  #   High Tier: boundType Loot, not dismantlable, not tradable, combineOptionValue 3
  #   Mid Tier:  boundType Equip, dismantlable, tradable, combineOptionValue 2
  # ===========================================================================

  _HighTierWeaponBase:
    $extends: _WeaponBase
    boundType: Loot
    dismantlable: false
    tradable: false
    combineOptionValue: 3

  _MidTierWeaponBase:
    $extends: _WeaponBase
    boundType: Equip
    dismantlable: true
    tradable: true
    combineOptionValue: 2

  _HighTierChestBase:
    $extends: _ChestBase
    boundType: Loot
    dismantlable: false
    tradable: false
    combineOptionValue: 3

  _MidTierChestBase:
    $extends: _ChestBase
    boundType: Equip
    dismantlable: true
    tradable: true
    combineOptionValue: 2

  _HighTierGlovesBase:
    $extends: _GlovesBase
    boundType: Loot
    dismantlable: false
    tradable: false
    combineOptionValue: 3

  _MidTierGlovesBase:
    $extends: _GlovesBase
    boundType: Equip
    dismantlable: true
    tradable: true
    combineOptionValue: 2

  _HighTierBootsBase:
    $extends: _BootsBase
    boundType: Loot
    dismantlable: false
    tradable: false
    combineOptionValue: 3

  _MidTierBootsBase:
    $extends: _BootsBase
    boundType: Equip
    dismantlable: true
    tradable: true
    combineOptionValue: 2

  # ===========================================================================
  # TOP TIER (Grade 4 / Mythic) - WEAPONS
  # ===========================================================================

  # DPS and Tank classes share the same weapon enchant pool
  HighTierWeaponDPSTankItem:
    $extends: _HighTierWeaponBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_WEAPON_DPS_TANK

  HighTierWeaponHealerItem:
    $extends: _HighTierWeaponBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_WEAPON_HEALER

  # ===========================================================================
  # TOP TIER (Grade 4 / Mythic) - ARMOR
  # ===========================================================================

  HighTierChestItem:
    $extends: _HighTierChestBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_CHEST

  HighTierHandMailItem:
    $extends: _HighTierGlovesBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_HAND_MAIL

  HighTierHandLeatherItem:
    $extends: _HighTierGlovesBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_HAND_LEATHER

  HighTierHandRobeItem:
    $extends: _HighTierGlovesBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_HAND_ROBE

  HighTierBootsItem:
    $extends: _HighTierBootsBase
    rareGrade: Mythic
    linkEnchantId: $ENCHANT_HIGH_TIER_BOOTS

  # ===========================================================================
  # MID TIER (Grade 3 / Superior) - WEAPONS
  # ===========================================================================

  # DPS and Tank classes share the same weapon enchant pool
  MidTierWeaponDPSTankItem:
    $extends: _MidTierWeaponBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_WEAPON_DPS_TANK

  MidTierWeaponHealerItem:
    $extends: _MidTierWeaponBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_WEAPON_HEALER

  # ===========================================================================
  # MID TIER (Grade 3 / Superior) - ARMOR
  # ===========================================================================

  MidTierChestItem:
    $extends: _MidTierChestBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_CHEST

  MidTierHandMailItem:
    $extends: _MidTierGlovesBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_HAND_MAIL

  MidTierHandLeatherItem:
    $extends: _MidTierGlovesBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_HAND_LEATHER

  MidTierHandRobeItem:
    $extends: _MidTierGlovesBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_HAND_ROBE

  MidTierBootsItem:
    $extends: _MidTierBootsBase
    rareGrade: Superior
    linkEnchantId: $ENCHANT_MID_TIER_BOOTS

  # ===========================================================================
  # CLASS-SPECIFIC WEAPON DERIVATIONS
  # Each extends the appropriate tier weapon definition and adds the subtype,
  # category, and requiredClass attributes for its class.
  # ===========================================================================

  # Chain — Soulless (Reaper)
  MidTierChainWeapon:
    $extends: MidTierWeaponDPSTankItem
    combatItemSubType: chain
    category: chain
    dropType: 0
    requiredClass:
      - SOULLESS

  HighTierChainWeapon:
    $extends: HighTierWeaponDPSTankItem
    combatItemSubType: chain
    category: chain
    dropType: 0
    requiredClass:
      - SOULLESS

  # Gauntlet — Fighter (Brawler)
  MidTierGauntletWeapon:
    $extends: MidTierWeaponDPSTankItem
    combatItemSubType: gauntlet
    category: gauntlet
    dropType: 0
    requiredClass:
      - FIGHTER

  HighTierGauntletWeapon:
    $extends: HighTierWeaponDPSTankItem
    combatItemSubType: gauntlet
    category: gauntlet
    dropType: 0
    requiredClass:
      - FIGHTER

exports:
  variables:
    # Re-export enchant IDs for consumers that need them directly
    - ENCHANT_HIGH_TIER_WEAPON_DPS_TANK
    - ENCHANT_HIGH_TIER_WEAPON_HEALER
    - ENCHANT_HIGH_TIER_CHEST
    - ENCHANT_HIGH_TIER_HAND_MAIL
    - ENCHANT_HIGH_TIER_HAND_LEATHER
    - ENCHANT_HIGH_TIER_HAND_ROBE
    - ENCHANT_HIGH_TIER_BOOTS
    - ENCHANT_MID_TIER_WEAPON_DPS_TANK
    - ENCHANT_MID_TIER_WEAPON_HEALER
    - ENCHANT_MID_TIER_CHEST
    - ENCHANT_MID_TIER_HAND_MAIL
    - ENCHANT_MID_TIER_HAND_LEATHER
    - ENCHANT_MID_TIER_HAND_ROBE
    - ENCHANT_MID_TIER_BOOTS
  definitions:
    # Top Tier (Mythic) items
    - HighTierWeaponDPSTankItem
    - HighTierWeaponHealerItem
    - HighTierChestItem
    - HighTierHandMailItem
    - HighTierHandLeatherItem
    - HighTierHandRobeItem
    - HighTierBootsItem
    # Mid Tier (Superior) items
    - MidTierWeaponDPSTankItem
    - MidTierWeaponHealerItem
    - MidTierChestItem
    - MidTierHandMailItem
    - MidTierHandLeatherItem
    - MidTierHandRobeItem
    - MidTierBootsItem
    # Class-specific weapon derivations
    - MidTierChainWeapon
    - HighTierChainWeapon
    - MidTierGauntletWeapon
    - HighTierGauntletWeapon
