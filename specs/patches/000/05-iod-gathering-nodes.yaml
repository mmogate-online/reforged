  version: "1.0"
  schema: v92

collections:
  update:
    - collectionId: 409
      changes:
        pickSkillType: 4
    - collectionId: 410
      changes:
        pickSkillType: 4
    - collectionId: 411
      changes:
        pickSkillType: 4
    - collectionId: 492
      changes:
        pickSkillType: 1
    - collectionId: 496
      changes:
        pickSkillType: 2

