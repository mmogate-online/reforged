# Island of Dawn — skill name corrections in quest strings
# Skill learning order changed between v31 and v92. The IoD tutorial quests
# reference skill names by string, so they must reflect the v92 skill names.
#
# quest 1371 (Warrior): Rain of Blows → Combative Strike
# quest 1373 (Lancer):  Whirlwind → Heart Thrust
# quest 1374 (Slayer):  Cyclone → Thunder Strike
# quest 1375 (Archer):  Arrow Volley → Radiant Arrow
# quest 1379 (Sorcerer): Scattershot I → Arcane Barrage I

spec:
  version: "1.0"
  schema: v92

questStrings:
  update:
    - id: 1371006
      changes:
        string: "Learn Combative Strike from the Instructor or the Skills menu (K key)."
    - id: 1371007
      changes:
        string: "You have learned 'Combative Strike'!"
    - id: 1373006
      changes:
        string: "Learn Heart Thrust from the Instructor or the Skills menu (K key)."
    - id: 1373007
      changes:
        string: "You have learned Heart Thrust!"
    - id: 1374006
      changes:
        string: "Learn Thunder Strike from the Instructor or the Skills menu (K key).."
    - id: 1374007
      changes:
        string: "You have learned 'Thunder Strike'!"
    - id: 1375006
      changes:
        string: "Learn Radiant Arrow from the Instructor or the Skills menu (K key).."
    - id: 1375007
      changes:
        string: "You have learned Radiant Arrow!"
    - id: 1379006
      changes:
        string: "Learn Arcane Barrage I from the instructor or the Skills menu (K key)."
    - id: 1379007
      changes:
        string: "You learned Arcane Barrage I!"
