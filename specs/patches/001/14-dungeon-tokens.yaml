# ===========================================================================
# Dungeon Tokens + Medal Exchange Shops
# ===========================================================================
#
# Each dungeon has a unique MEDAL_USEABLE token dropped by bosses.
# Right-click opens a MedalStore shop via VillagerMenuItem → BuyMenuList → BuyList.
#
# Token economy (per dungeon run, 5-man party):
#   Bastion of Lok:  1 boss × 3 tokens = 3 tokens/run
#   Sinestral Manor: 3 bosses × 1 token = 3 tokens/run
#
# Potential Unlock Scroll: 2 tokens, 10% success rate
#   → ~7 runs per successful unlock, ~28 runs for full 4-piece set

spec:
  version: "1.0"
  schema: v92

imports:
  - from: dungeon-tokens
    use:
      variables:
        - BASTION_OF_LOK_TOKEN
        - SINESTRAL_MANOR_TOKEN
        - BASTION_OF_LOK_MENU
        - SINESTRAL_MANOR_MENU
        - BASTION_OF_LOK_LIST
        - SINESTRAL_MANOR_LIST

# ===========================================================================
# Token Item Definitions
# ===========================================================================

definitions:
  _DungeonToken:
    name: token
    combatItemType: MEDAL_USEABLE
    combatItemSubType: etc
    category: etc
    rank: 0
    rareGrade: 3
    level: 1
    requiredLevel: 1
    searchable: true
    conversion: false
    sortingNumber: 0
    dropType: 2
    buyPrice: 0
    sellPrice: 0
    divide: 0
    maxStack: 10000
    slotLimit: 0
    coolTimeGroup: 0
    itemUseCount: 1
    maxDropUnit: 9999
    enchantEnable: false
    tradable: false
    boundType: None
    destroyable: true
    dismantlable: false
    warehouseStorable: true
    guildWarehouseStorable: false
    storeSellable: false
    obtainable: true
    relocatable: true
    artisanable: false
    unidentifiedItemGrade: 0
    masterpieceRate: 0
    linkEquipmentId: 0
    linkLookInfoId: 0
    changeLook: false
    extractLook: false
    changeColorEnable: false
    requiredGuildMaster: false
    requiredEquipmentType: NO_COMBAT
    linkCrestId: 0
    linkCustomizingId: 0
    linkSkillId: 0
    linkPetAdultId: 0
    linkPetOrbId: 0
    icon: Icon_Items.mysterypaper5_Tex
    dropSilhouette: DropItem.SM.Item_Drop_Chest_SM
    dropSound: InterfaceSound.Drop_ItemCUE.Drop_ChestBoxCue
    usedSound: InterfaceSound.UseItem.UseItemCue
    equipSound: InterfaceSound.Equip_ItemCUE.Equip_ScrollCue
    defaultValue: 0

# ===========================================================================
# Token Items
# ===========================================================================

items:
  upsert:
    - id: $BASTION_OF_LOK_TOKEN
      $extends: _DungeonToken
      strings:
        name: "Bastion of Lok Token"
        toolTip: "A token earned by defeating the denizens of the Bastion of Lok.$BR$BR<font color = '#41FF3A'>[Right-click]</font> to open the Bastion of Lok Exchange."

    - id: $SINESTRAL_MANOR_TOKEN
      $extends: _DungeonToken
      strings:
        name: "Sinestral Manor Token"
        toolTip: "A token earned by defeating the dark nobility of Sinestral Manor.$BR$BR<font color = '#41FF3A'>[Right-click]</font> to open the Sinestral Manor Exchange."

# ===========================================================================
# Medal Store Wiring
# ===========================================================================
#
# Right-click shop chain:
#   VillagerMenuItem (itemTemplateId=token, type=MedalStore, id=MENU)
#     → BuyMenuList (Menu id=MENU)
#       → BuyList (List id=LIST, NeedMedalItemId=token)
#         → Potential Unlock Scroll (item 90), cost 2 tokens

villagerMenuItems:
  upsert:
    - id: $BASTION_OF_LOK_MENU
      itemTemplateId: $BASTION_OF_LOK_TOKEN
      type: MedalStore

    - id: $SINESTRAL_MANOR_MENU
      itemTemplateId: $SINESTRAL_MANOR_TOKEN
      type: MedalStore

buyMenuLists:
  upsert:
    - id: $BASTION_OF_LOK_MENU
      stringId: $BASTION_OF_LOK_MENU
      desc: "Bastion of Lok Token Exchange"
      itemLists:
        - id: $BASTION_OF_LOK_LIST
          stringed: $BASTION_OF_LOK_MENU

    - id: $SINESTRAL_MANOR_MENU
      stringId: $SINESTRAL_MANOR_MENU
      desc: "Sinestral Manor Token Exchange"
      itemLists:
        - id: $SINESTRAL_MANOR_LIST
          stringed: $SINESTRAL_MANOR_MENU

buyLists:
  upsert:
    - id: $BASTION_OF_LOK_LIST
      desc: "Bastion of Lok Progression Items"
      needMedalItemId: $BASTION_OF_LOK_TOKEN
      items:
        - itemId: 90
          priceRevision: 2

    - id: $SINESTRAL_MANOR_LIST
      desc: "Sinestral Manor Progression Items"
      needMedalItemId: $SINESTRAL_MANOR_TOKEN
      items:
        - itemId: 90
          priceRevision: 2

# ===========================================================================
# Shop Title Strings
# ===========================================================================
#
# BuyMenuList.stringId resolves against StrSheet_Npc.
# Must match the Menu id used in BuyMenuList.

npcStrings:
  upsert:
    - id: $BASTION_OF_LOK_MENU
      string: "Bastion of Lok Exchange"

    - id: $SINESTRAL_MANOR_MENU
      string: "Sinestral Manor Exchange"

# ===========================================================================
# Medal Exchange Rates
# ===========================================================================
#
# ItemMedalExchange defines the actual transaction cost for each item.
# Required alongside BuyList — BuyList drives the shop UI, ItemMedalExchange
# drives the exchange validation. Both must agree on the price.

exchanges:
  upsert:
    - itemId: 90
      medalItemId: $BASTION_OF_LOK_TOKEN
      buyPriceMedal: 2

    - itemId: 90
      medalItemId: $SINESTRAL_MANOR_TOKEN
      buyPriceMedal: 2
