# Missing Brawler Weapons for Level 60 Sets
# Creates gauntlet weapons for Brawler (FIGHTER) class
# for sets that predate this class.
#
# Sets completed:
#   - Visionmaker (1 item: 82597)
#   - Steadfast (1 item: 82598)

spec:
  version: "1.0"
  schema: v92

imports:
  - from: equipment-item-standard
    use:
      definitions:
        - MidTierGauntletWeapon
        - HighTierGauntletWeapon

definitions:
  midTierBrawlerWeapon:
    $extends: MidTierGauntletWeapon
    name: gauntlet
    level: 60
    rank: 4
    divide: 0
    buyPrice: 445360
    sellPrice: 44536
    extractRatio: 24
    requiredLevel: 60
    icon: Icon_Equipments.Gauntlet3_B_Tex
    defaultValue: 8907188
    linkLookInfoId: 111012
    changeColorEnable: false
    changeEnchantFxId: 1007
    linkMaterialEnchantId: 23004
    artisanable: false

  highTierBrawlerWeapon:
    $extends: HighTierGauntletWeapon
    name: gauntlet
    level: 60
    rank: 4
    divide: 0
    buyPrice: 445360
    sellPrice: 44536
    extractRatio: 24
    requiredLevel: 60
    icon: Icon_Equipments.Gauntlet3_B_Tex
    defaultValue: 8907188
    linkLookInfoId: 111012
    changeColorEnable: false
    changeEnchantFxId: 1007
    linkMaterialEnchantId: 33004
    artisanable: true

items:
  upsert:
    # Visionmaker Gauntlet
    - $extends: highTierBrawlerWeapon
      id: 82597
      linkEquipmentId: 105169
      itemLevelId: 10165
      linkPassivityId:
        - "130470"
        - "317261"
        - "1310900"
        - "1311300"
        - "1311100"
        - "1310300"
        - "1310200"
        - "3000020"
      strings:
        name: "Steelgaze Powerfists"
        toolTip: "Visionmaker gauntlets forged for brawlers."
      equipment:
        computed: true

    # Steadfast Gauntlet
    - $extends: midTierBrawlerWeapon
      id: 82598
      linkEquipmentId: 105170
      itemLevelId: 10179
      linkPassivityId:
        - "210907"
        - "130469"
        - "510010"
        - "510080"
        - "510040"
      strings:
        name: "Irongrip Gauntlets"
        toolTip: "Steadfast gauntlets forged for brawlers."
      equipment:
        computed: true
