        - DYAD_CONCACH_STRUCTURE
        - SMART_DYAD_CONCACH_STRUCTURE
        - DYAD_CRUX_STRUCTURE
        - SMART_DYAD_CRUX_STRUCTURE
        - RHOMB_STRUCTURE

definitions:
  dyadStructureBase:
    name: RawStone
    combatItemType: RAWSTONE
    combatItemSubType: generalMaterial
    category: generalMaterial
    rank: 0
    sortingNumber: 1
    maxStack: 100
    maxDropUnit: 100
    slotLimit: 0
    coolTimeGroup: 0
    tradable: false
    warehouseStorable: true
    guildWarehouseStorable: false
    boundType: None
    destroyable: true
    storeSellable: true
    searchable: true
    obtainable: true
    relocatable: true
    enchantEnable: false
    dismantlable: false
    artisanable: false
    requiredEquipmentType: NO_COMBAT
    requiredLevel: 1
    dropSilhouette: DropItem.SM.Item_Drop_Chest_SM
    dropSound: InterfaceSound.Drop_ItemCUE.Drop_ChestBoxCue
    equipSound: InterfaceSound.Equip_ItemCUE.Equip_CustomizeStoneCue

items:
  upsert:
    - id: $DYAD_RHOMB_STRUCTURE
      $extends: dyadStructureBase
      rareGrade: 2
      level: 1
      buyPrice: 262
      sellPrice: 26
      defaultValue: 262
      linkRawStoneId: $DYAD_RHOMB_STRUCTURE
      icon: Icon_Items.RawCrystal01A_Tex
      strings:
        name: "Dyad Rhomb Structure"
        toolTip: "Fuse 3 fine rhomb crystals to produce a random dyad rhomb.\nSuccess Rate: 100%"
