# Dyad Crystal Structures — Patch 001
# Dyad/Smart Dyad structures (UPGRADE) + Rhomb Structure (TIERUP)

spec:
  version: "1.0"
  schema: v92

imports:
  - from: crystals
    use:
      variables:
        - DYAD_RHOMB_STRUCTURE
        - SMART_DYAD_RHOMB_STRUCTURE
        - DYAD_CABOCHON_STRUCTURE
        - SMART_DYAD_CABOCHON_STRUCTURE
        - DYAD_HEXAGE_STRUCTURE
        - SMART_DYAD_HEXAGE_STRUCTURE
        - DYAD_PENTANT_STRUCTURE
