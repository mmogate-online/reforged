rawStoneItems:
  upsert:
    # Dyad Rhomb — 3x Fine Rhomb (rareGrade 1) → Random Dyad Rhomb
    - rawStoneItemId: $DYAD_RHOMB_STRUCTURE
      type: UPGRADE
      useGambleItemGrade:
        - 1
      useRareGrade: 1
      useEquipmentType:
        - EQUIP_WEAPON
        - EQUIP_ARMOR_BODY
      rate: 1.0
      succeedRate: 0
      needSameMaterial: false
    # Smart Dyad Rhomb — 3x Same Fine Rhomb (rareGrade 1) → Same-type Dyad Rhomb
