# Crystal Upgrade System — Patch 001
# Common-to-Fine crystal refinement structures.
# Reforged addition: allows upgrading Common crystals to Fine grade.
# Uses UPGRADE type (same tier, rarity increase).
#
# Mechanic: 3x Common crystals + 1x Refinement Structure → 1x Fine crystal (same tier)
# Output draws from existing rareGrade=1 CustomizingItemBag pools.

spec:
  version: "1.0"
  schema: v92

imports:
  - from: crystals
    use:
      variables:
        - RHOMB_REFINEMENT_STRUCTURE
        - CABOCHON_REFINEMENT_STRUCTURE
        - HEXAGE_REFINEMENT_STRUCTURE
        - PENTANT_REFINEMENT_STRUCTURE
        - CONCACH_REFINEMENT_STRUCTURE
        - CRUX_REFINEMENT_STRUCTURE
        - NIVEOT_REFINEMENT_STRUCTURE

definitions:
  refinementStructureBase:
    combatItemType: RAWSTONE
    combatItemSubType: service
    category: service
    maxStack: 100
    tradable: true
    warehouseStorable: true
    guildWarehouseStorable: false
    boundType: None
    destroyable: true
    storeSellable: true
    searchable: true
    obtainable: true
    relocatable: true
    enchantEnable: false
    dismantlable: false
    artisanable: false
    icon: Icon_Items.Combine_Crystal_Slot_Tex
    rareGrade: 0
    rank: 0

items:
  upsert:
    - id: $RHOMB_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 1
      requiredLevel: 1
      buyPrice: 500
      sellPrice: 50
      strings:
        name: "Rhomb Refinement Structure"
        toolTip: "Used to refine 3 Common Rhomb crystals into a Fine Rhomb crystal.\nSuccess Rate: 75%"
    - id: $CABOCHON_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 11
      requiredLevel: 1
      buyPrice: 1000
      sellPrice: 100
      strings:
        name: "Cabochon Refinement Structure"
        toolTip: "Used to refine 3 Common Cabochon crystals into a Fine Cabochon crystal.\nSuccess Rate: 65%"
    - id: $HEXAGE_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 23
      requiredLevel: 1
      buyPrice: 1500
      sellPrice: 150
      strings:
        name: "Hexage Refinement Structure"
        toolTip: "Used to refine 3 Common Hexage crystals into a Fine Hexage crystal.\nSuccess Rate: 55%"
    - id: $PENTANT_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 35
      requiredLevel: 1
      buyPrice: 2000
      sellPrice: 200
      strings:
        name: "Pentant Refinement Structure"
        toolTip: "Used to refine 3 Common Pentant crystals into a Fine Pentant crystal.\nSuccess Rate: 45%"
    - id: $CONCACH_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 48
      requiredLevel: 1
      buyPrice: 2500
      sellPrice: 250
      strings:
        name: "Concach Refinement Structure"
        toolTip: "Used to refine 3 Common Concach crystals into a Fine Concach crystal.\nSuccess Rate: 40%"
    - id: $CRUX_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 58
      requiredLevel: 1
      buyPrice: 3000
      sellPrice: 300
      strings:
        name: "Crux Refinement Structure"
        toolTip: "Used to refine 3 Common Crux crystals into a Fine Crux crystal.\nSuccess Rate: 35%"
    - id: $NIVEOT_REFINEMENT_STRUCTURE
      $extends: refinementStructureBase
      level: 65
      requiredLevel: 1
      buyPrice: 3500
      sellPrice: 350
      strings:
        name: "Niveot Refinement Structure"
        toolTip: "Used to refine 3 Common Niveot crystals into a Fine Niveot crystal.\nSuccess Rate: 30%"

rawStoneItems:
  upsert:
    # Rhomb Refinement — Common grade 1 → Fine grade 1
    - rawStoneItemId: $RHOMB_REFINEMENT_STRUCTURE
      type: UPGRADE
      useGambleItemGrade:
        - 1
      useRareGrade: 0
      useEquipmentType:
        - EQUIP_WEAPON
        - EQUIP_ARMOR_BODY
      rate: 0.75
      succeedRate: 0
      needSameMaterial: false
    # Cabochon Refinement — Common grade 2 → Fine grade 2
    - rawStoneItemId: $CABOCHON_REFINEMENT_STRUCTURE
      type: UPGRADE
      useGambleItemGrade:
        - 2
      useRareGrade: 0
      useEquipmentType:
        - EQUIP_WEAPON
        - EQUIP_ARMOR_BODY
      rate: 0.65
      succeedRate: 0
      needSameMaterial: false
    # Hexage Refinement — Common grade 3 → Fine grade 3
    - rawStoneItemId: $HEXAGE_REFINEMENT_STRUCTURE
      type: UPGRADE
