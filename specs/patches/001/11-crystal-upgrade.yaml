      needSameMaterial: false
    # Crux Refinement — Common grade 6 → Fine grade 6
    - rawStoneItemId: $CRUX_REFINEMENT_STRUCTURE
      type: UPGRADE
      useGambleItemGrade:
        - 6
      useRareGrade: 0
      useEquipmentType:
        - EQUIP_WEAPON
        - EQUIP_ARMOR_BODY
      rate: 0.35
      succeedRate: 0
      needSameMaterial: false
    # Niveot Refinement — Common grade 7 → Fine grade 7
