# Valley of Titans (Zone 6) — Tier 2 eCompensation
# All mob drops: crystal boxes, runes, fusion structures, alkahest, feedstock, infusion boxes, gold

spec:
  version: "1.0"
  schema: v92

imports:
  - from: crystals
    use:
      variables:
        - WEAPON_CRYSTAL_BOX_CABOCHON
        - ARMOR_CRYSTAL_BOX_CABOCHON
        - CABOCHON_STRUCTURE
        - DYAD_CABOCHON_STRUCTURE
        - SMART_DYAD_CABOCHON_STRUCTURE
  - from: evolution-base
    use:
      variables:
        - PAVERUNE_OF_SHARA
        - PAVERUNE_OF_ARUN

definitions:
  # Normal mobs — 38 NPCs, Lv16-20
  valley_of_titans_normal:
    itemBags:
      - id: 1
        bagName: "Valley of Titans Normal Crystal"
        probability: 0.03
        equalProbability: true
        items:
          - templateId: $WEAPON_CRYSTAL_BOX_CABOCHON
            name: "Weapon Crystal Box"
          - templateId: $ARMOR_CRYSTAL_BOX_CABOCHON
            name: "Armor Crystal Box"
      - id: 2
        bagName: "Valley of Titans Normal Rune"
        probability: 0.05
        equalProbability: true
        items:
          - templateId: $PAVERUNE_OF_SHARA
            name: "Weapon Evolution Rune"
          - templateId: $PAVERUNE_OF_ARUN
            name: "Armor Evolution Rune"
      - id: 3
        bagName: "Valley of Titans Normal Alkahest"
        probability: 1.0
        items:
          - templateId: 21351
            name: "Alkahest"
            probability: 0.99
            min: 1
            max: 2
          - templateId: $CABOCHON_STRUCTURE
            name: "Fusion Structure"
            probability: 0.01
      - id: 4
        bagName: "Valley of Titans Normal Feedstock"
        probability: 1.0
        items:
          - templateId: 94101
            name: "Feedstock"
            probability: 0.99
            min: 2
            max: 4
      - id: 5
        bagName: "Valley of Titans Normal Infusion (Uncommon)"
        probability: 0.1
        equalProbability: true
        items:
          - templateId: 602190
            name: "Infusion Weapon Box (Uncommon)"
          - templateId: 602193
            name: "Infusion Chest Box (Uncommon)"
          - templateId: 602196
            name: "Infusion Gloves Box (Uncommon)"
          - templateId: 602199
            name: "Infusion Boots Box (Uncommon)"
      - id: 6
        bagName: "Valley of Titans Normal Infusion (Rare)"
        probability: 0.01
        equalProbability: true
        items:
          - templateId: 602191
            name: "Infusion Weapon Box (Rare)"
          - templateId: 602194
            name: "Infusion Chest Box (Rare)"
          - templateId: 602197
            name: "Infusion Gloves Box (Rare)"
          - templateId: 602200
            name: "Infusion Boots Box (Rare)"
      - id: 7
        bagName: "Valley of Titans Normal Infusion (Superior)"
        probability: 0.001
        equalProbability: true
        items:
          - templateId: 602192
            name: "Infusion Weapon Box (Superior)"
          - templateId: 602195
            name: "Infusion Chest Box (Superior)"
          - templateId: 602198
            name: "Infusion Gloves Box (Superior)"
          - templateId: 602201
            name: "Infusion Boots Box (Superior)"

  # Boss mobs — 1 NPCs, Lv20
  valley_of_titans_boss:
    itemBags:
      - id: 1
        bagName: "Valley of Titans Weapon Crystal"
        probability: 0.5
        items:
          - templateId: $WEAPON_CRYSTAL_BOX_CABOCHON
            name: "Weapon Crystal Box"
            probability: 1.0
      - id: 2
        bagName: "Valley of Titans Armor Crystal"
        probability: 0.5
        items:
          - templateId: $ARMOR_CRYSTAL_BOX_CABOCHON
            name: "Armor Crystal Box"
            probability: 1.0
      - id: 3
        bagName: "Valley of Titans Weapon Rune"
        probability: 1.0
        items:
          - templateId: $PAVERUNE_OF_SHARA
            name: "Weapon Evolution Rune"
            probability: 1.0
      - id: 4
        bagName: "Valley of Titans Armor Rune"
        probability: 1.0
        items:
          - templateId: $PAVERUNE_OF_ARUN
            name: "Armor Evolution Rune"
            probability: 1.0
      - id: 5
        bagName: "Valley of Titans Fusion Structure"
        probability: 0.15
        items:
          - templateId: $CABOCHON_STRUCTURE
            name: "Fusion Structure"
            probability: 1.0
            min: 1
            max: 2
      - id: 6
        bagName: "Valley of Titans Dyad Structure"
        probability: 0.1
        items:
          - templateId: $DYAD_CABOCHON_STRUCTURE
            name: "Dyad Structure"
            probability: 1.0
      - id: 7
        bagName: "Valley of Titans Smart Dyad Structure"
        probability: 0.01
        items:
          - templateId: $SMART_DYAD_CABOCHON_STRUCTURE
            name: "Smart Dyad Structure"
            probability: 1.0
      - id: 8
        bagName: "Valley of Titans Alkahest"
        probability: 1.0
        items:
          - templateId: 21351
            name: "Alkahest"
            probability: 1.0
            min: 3
            max: 6
      - id: 9
        bagName: "Valley of Titans Feedstock"
        probability: 1.0
        items:
          - templateId: 94101
            name: "Feedstock"
            probability: 1.0
            min: 6
            max: 12
      - id: 10
        bagName: "Valley of Titans Boss Infusion (Uncommon)"
        probability: 0.5
        equalProbability: true
        items:
          - templateId: 602190
            name: "Infusion Weapon Box (Uncommon)"
          - templateId: 602193
            name: "Infusion Chest Box (Uncommon)"
          - templateId: 602196
            name: "Infusion Gloves Box (Uncommon)"
          - templateId: 602199
            name: "Infusion Boots Box (Uncommon)"
      - id: 11
        bagName: "Valley of Titans Boss Infusion (Rare)"
        probability: 0.1
        equalProbability: true
        items:
          - templateId: 602191
            name: "Infusion Weapon Box (Rare)"
          - templateId: 602194
            name: "Infusion Chest Box (Rare)"
          - templateId: 602197
            name: "Infusion Gloves Box (Rare)"
          - templateId: 602200
            name: "Infusion Boots Box (Rare)"
      - id: 12
        bagName: "Valley of Titans Boss Infusion (Superior)"
        probability: 0.01
        equalProbability: true
        items:
          - templateId: 602192
            name: "Infusion Weapon Box (Superior)"
          - templateId: 602195
            name: "Infusion Chest Box (Superior)"
          - templateId: 602198
            name: "Infusion Gloves Box (Superior)"
          - templateId: 602201
            name: "Infusion Boots Box (Superior)"
    goldBags:
      - bagName: "Valley of Titans Gold"
        probability: 1.0
        min: 5
        max: 15

eCompensations:
  upsert:
    # Normal (38 NPCs): 1031=Ravenous Hyena Lv16-20, 1032=Starving Hyena Lv16-20, 1041=Gutrend Kulkari Lv16-20, 1042=Gutrend Hyena Lv16-20, 1051=Gutrend Clawtamer Lv16-20, 1052=Gutrend Hyena Lv16-20, ... (+32 more)
    - huntingZoneId: 6
      npcTemplateId: [1031, 1032, 1041, 1042, 1051, 1052, 1061, 1062, 1071, 1081, 1091, 2011, 2021, 2031, 2041, 2051, 2061, 2081, 2082, 3011, 3021, 3031, 3032, 3041, 3042, 5001, 5002, 7031, 7032, 7033, 7041, 7051, 8001, 8002, 8003, 8004, 8005, 8006]
      npcName: ""
      $extends: valley_of_titans_normal
    # Boss (1 NPCs): 5003=Arakia Lv20
    - huntingZoneId: 6
      npcTemplateId: [5003]
      npcName: ""
      $extends: valley_of_titans_boss

