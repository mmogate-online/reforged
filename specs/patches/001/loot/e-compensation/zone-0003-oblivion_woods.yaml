# Oblivion Woods (Zone 3) — Tier 2 eCompensation
# All mob drops: crystal boxes, runes, refinement, alkahest, feedstock, infusion boxes, gold

spec:
  version: "1.0"
  schema: v92

imports:
  - from: crystals
    use:
      variables:
        - WEAPON_CRYSTAL_BOX_CABOCHON
        - ARMOR_CRYSTAL_BOX_CABOCHON
        - CABOCHON_REFINEMENT_STRUCTURE
  - from: evolution-base
    use:
      variables:
        - PAVERUNE_OF_SHARA
        - PAVERUNE_OF_ARUN

definitions:
  # Normal mobs — 26 NPCs, Lv12-19
  oblivion_woods_normal:
    itemBags:
      - id: 1
        bagName: "Oblivion Woods Normal Crystal"
        probability: 0.03
        equalProbability: true
        items:
          - templateId: $WEAPON_CRYSTAL_BOX_CABOCHON
            name: "Weapon Crystal Box"
          - templateId: $ARMOR_CRYSTAL_BOX_CABOCHON
            name: "Armor Crystal Box"
      - id: 2
        bagName: "Oblivion Woods Normal Rune"
        probability: 0.05
        equalProbability: true
        items:
          - templateId: $PAVERUNE_OF_SHARA
            name: "Weapon Evolution Rune"
          - templateId: $PAVERUNE_OF_ARUN
            name: "Armor Evolution Rune"
      - id: 3
        bagName: "Oblivion Woods Normal Alkahest"
        probability: 1.0
        items:
          - templateId: 21351
            name: "Alkahest"
            probability: 0.99
            min: 1
            max: 2
          - templateId: $CABOCHON_REFINEMENT_STRUCTURE
            name: "Refinement Structure"
            probability: 0.01
      - id: 4
        bagName: "Oblivion Woods Normal Feedstock"
        probability: 1.0
        items:
          - templateId: 94101
            name: "Feedstock"
            probability: 0.99
            min: 2
            max: 4
      - id: 5
        bagName: "Oblivion Woods Normal Infusion (Uncommon)"
        probability: 0.1
        equalProbability: true
        items:
          - templateId: 602190
            name: "Infusion Weapon Box (Uncommon)"
          - templateId: 602193
            name: "Infusion Chest Box (Uncommon)"
          - templateId: 602196
            name: "Infusion Gloves Box (Uncommon)"
          - templateId: 602199
            name: "Infusion Boots Box (Uncommon)"
      - id: 6
        bagName: "Oblivion Woods Normal Infusion (Rare)"
        probability: 0.01
        equalProbability: true
        items:
          - templateId: 602191
            name: "Infusion Weapon Box (Rare)"
          - templateId: 602194
            name: "Infusion Chest Box (Rare)"
          - templateId: 602197
            name: "Infusion Gloves Box (Rare)"
          - templateId: 602200
            name: "Infusion Boots Box (Rare)"
      - id: 7
        bagName: "Oblivion Woods Normal Infusion (Superior)"
        probability: 0.001
        equalProbability: true
        items:
          - templateId: 602192
            name: "Infusion Weapon Box (Superior)"
          - templateId: 602195
            name: "Infusion Chest Box (Superior)"
          - templateId: 602198
            name: "Infusion Gloves Box (Superior)"
          - templateId: 602201
            name: "Infusion Boots Box (Superior)"

  # Boss mobs — 3 NPCs, Lv20-21
  oblivion_woods_boss:
    itemBags:
      - id: 1
        bagName: "Oblivion Woods Weapon Crystal"
        probability: 0.5
        items:
          - templateId: $WEAPON_CRYSTAL_BOX_CABOCHON
            name: "Weapon Crystal Box"
            probability: 1.0
      - id: 2
        bagName: "Oblivion Woods Armor Crystal"
        probability: 0.5
        items:
          - templateId: $ARMOR_CRYSTAL_BOX_CABOCHON
            name: "Armor Crystal Box"
            probability: 1.0
      - id: 3
        bagName: "Oblivion Woods Weapon Rune"
        probability: 1.0
        items:
          - templateId: $PAVERUNE_OF_SHARA
            name: "Weapon Evolution Rune"
            probability: 1.0
      - id: 4
        bagName: "Oblivion Woods Armor Rune"
        probability: 1.0
        items:
          - templateId: $PAVERUNE_OF_ARUN
            name: "Armor Evolution Rune"
            probability: 1.0
      - id: 5
        bagName: "Oblivion Woods Refinement"
        probability: 0.15
        items:
          - templateId: $CABOCHON_REFINEMENT_STRUCTURE
            name: "Refinement Structure"
            probability: 1.0
            min: 1
            max: 2
      - id: 6
        bagName: "Oblivion Woods Alkahest"
        probability: 1.0
        items:
          - templateId: 21351
            name: "Alkahest"
            probability: 1.0
            min: 3
            max: 6
      - id: 7
        bagName: "Oblivion Woods Feedstock"
        probability: 1.0
        items:
          - templateId: 94101
            name: "Feedstock"
            probability: 1.0
            min: 6
            max: 12
      - id: 8
        bagName: "Oblivion Woods Boss Infusion (Uncommon)"
        probability: 0.5
        equalProbability: true
        items:
          - templateId: 602190
            name: "Infusion Weapon Box (Uncommon)"
          - templateId: 602193
            name: "Infusion Chest Box (Uncommon)"
          - templateId: 602196
            name: "Infusion Gloves Box (Uncommon)"
          - templateId: 602199
            name: "Infusion Boots Box (Uncommon)"
      - id: 9
        bagName: "Oblivion Woods Boss Infusion (Rare)"
        probability: 0.1
        equalProbability: true
        items:
          - templateId: 602191
            name: "Infusion Weapon Box (Rare)"
          - templateId: 602194
            name: "Infusion Chest Box (Rare)"
          - templateId: 602197
            name: "Infusion Gloves Box (Rare)"
          - templateId: 602200
            name: "Infusion Boots Box (Rare)"
      - id: 10
        bagName: "Oblivion Woods Boss Infusion (Superior)"
        probability: 0.01
        equalProbability: true
        items:
          - templateId: 602192
            name: "Infusion Weapon Box (Superior)"
          - templateId: 602195
            name: "Infusion Chest Box (Superior)"
          - templateId: 602198
            name: "Infusion Gloves Box (Superior)"
          - templateId: 602201
            name: "Infusion Boots Box (Superior)"
    goldBags:
      - bagName: "Oblivion Woods Gold"
        probability: 1.0
        min: 5
        max: 15

eCompensations:
  upsert:
    # Normal (26 NPCs): 2=Agitated Sporewalker Lv12-19, 3=Mossy Ghilliedhu Lv12-19, 7=Dakanius (Devan Raidmaster) Lv12-19, 9=Devan Archpriest Lv12-19, 12=Devan Warlord (Assault Leader) Lv12-19, 13=Dark Maiden (Assault Leader) Lv12-19, ... (+20 more)
    - huntingZoneId: 3
      npcTemplateId: [2, 3, 7, 9, 12, 13, 14, 15, 18, 19, 20, 21, 23, 24, 101, 1001, 2001, 300140, 300141, 300142, 300143, 300151, 300160, 300161, 300611, 301080]
      npcName: ""
      $extends: oblivion_woods_normal
    # Boss (3 NPCs): 10=10 Lv20-21, 22=Lanok (Forgotten Destroyer) Lv20-21, 300811=Basilisk Lv20-21
    - huntingZoneId: 3
      npcTemplateId: [10, 22, 300811]
      npcName: ""
      $extends: oblivion_woods_boss

