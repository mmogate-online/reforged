# Fey Forest (Zone 2) — Tier 2 eCompensation
# All mob drops: crystal boxes, runes, fusion structures, alkahest, feedstock, infusion boxes, gold

spec:
  version: "1.0"
  schema: v92

imports:
  - from: crystals
    use:
      variables:
        - WEAPON_CRYSTAL_BOX_CABOCHON
        - ARMOR_CRYSTAL_BOX_CABOCHON
        - CABOCHON_STRUCTURE
  - from: evolution-base
    use:
      variables:
        - PAVERUNE_OF_SHARA
        - PAVERUNE_OF_ARUN

definitions:
  # Normal mobs — 32 NPCs, Lv11-15
  fey_forest_normal:
    itemBags:
      - id: 1
        bagName: "Fey Forest Normal Crystal"
        probability: 0.03
        equalProbability: true
        items:
          - templateId: $WEAPON_CRYSTAL_BOX_CABOCHON
            name: "Weapon Crystal Box"
          - templateId: $ARMOR_CRYSTAL_BOX_CABOCHON
            name: "Armor Crystal Box"
      - id: 2
        bagName: "Fey Forest Normal Rune"
        probability: 0.05
        equalProbability: true
        items:
          - templateId: $PAVERUNE_OF_SHARA
            name: "Weapon Evolution Rune"
          - templateId: $PAVERUNE_OF_ARUN
            name: "Armor Evolution Rune"
      - id: 3
        bagName: "Fey Forest Normal Alkahest"
        probability: 1.0
        items:
          - templateId: 21351
            name: "Alkahest"
            probability: 0.99
            min: 1
            max: 2
          - templateId: $CABOCHON_STRUCTURE
            name: "Fusion Structure"
            probability: 0.01
      - id: 4
        bagName: "Fey Forest Normal Feedstock"
        probability: 1.0
        items:
          - templateId: 94101
            name: "Feedstock"
            probability: 0.99
            min: 2
            max: 4
      - id: 5
        bagName: "Fey Forest Normal Infusion (Uncommon)"
        probability: 0.1
        equalProbability: true
        items:
          - templateId: 602190
            name: "Infusion Weapon Box (Uncommon)"
          - templateId: 602193
            name: "Infusion Chest Box (Uncommon)"
          - templateId: 602196
            name: "Infusion Gloves Box (Uncommon)"
          - templateId: 602199
            name: "Infusion Boots Box (Uncommon)"
      - id: 6
        bagName: "Fey Forest Normal Infusion (Rare)"
        probability: 0.01
        equalProbability: true
        items:
          - templateId: 602191
            name: "Infusion Weapon Box (Rare)"
          - templateId: 602194
            name: "Infusion Chest Box (Rare)"
          - templateId: 602197
            name: "Infusion Gloves Box (Rare)"
          - templateId: 602200
            name: "Infusion Boots Box (Rare)"
      - id: 7
        bagName: "Fey Forest Normal Infusion (Superior)"
        probability: 0.001
        equalProbability: true
        items:
          - templateId: 602192
            name: "Infusion Weapon Box (Superior)"
          - templateId: 602195
            name: "Infusion Chest Box (Superior)"
          - templateId: 602198
            name: "Infusion Gloves Box (Superior)"
          - templateId: 602201
            name: "Infusion Boots Box (Superior)"

eCompensations:
  upsert:
    # Normal (32 NPCs): 1=Redcap Lv11-15, 2=Furious Faerie Lv11-15, 3=Centaur Lv11-15, 4=Slinking Sabertooth Lv11-15, 5=Hulking Sabertooth Lv11-15, 6=Sullen Unicorn Lv11-15, ... (+26 more)
    - huntingZoneId: 2
      npcTemplateId: [1, 2, 3, 4, 5, 6, 7, 8, 10, 13, 22, 23, 32, 33, 34, 52, 56, 57, 58, 59, 62, 102, 152, 202, 203, 206, 209, 210, 259, 260, 507, 510]
      npcName: ""
      $extends: fey_forest_normal

